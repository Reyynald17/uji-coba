<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Basic Tailwind dan Query</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded shadow w-80 text-center">
    <h1 class="text-xl font-bold mb-4">Demo Sangat Dasar</h1>

    <p id="text" class="mb-4 text-gray-700">Belum diklik</p>

    <button id="btn" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
      Klik Saya
    </button>
  </div>

  <script>
    $("#btn").click(function () {
      $("#text").text("Tombol sudah diklik");
      $("#text").addClass("text-green-600 font-semibold");
    });
  </script>

</body>
</html>
